<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Projetos em Execução — BM3 Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --petrol-900: #00242C;
      --petrol-800: #003B49;
      --petrol-700: #0A5566;
      --teal-500: #1C8C99;
      --teal-100: #E3F2F4;
      --bg: #F2F5F6;
      --card: #FFFFFF;
      --ink: #16282C;
      --ink-soft: #516268;
      --border: #E1E7E8;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0, 36, 44, 0.06), 0 1px 1px rgba(0, 36, 44, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 36, 44, 0.08);

      --status-exec-bg: #E3F2F4;
      --status-exec-fg: #0A5566;
      --status-exec-dot: #1C8C99;

      --status-pend-bg: #FFF3DF;
      --status-pend-fg: #8A5800;
      --status-pend-dot: #E08E0B;

      --status-espera-bg: #ECEEEE;
      --status-espera-fg: #5C6566;
      --status-espera-dot: #9AA3A4;

      --status-concl-bg: #E5F6EC;
      --status-concl-fg: #1F7A43;
      --status-concl-dot: #2E9E5B;

      --status-atraso-bg: #FDEAEA;
      --status-atraso-fg: #B23030;
      --status-atraso-dot: #D64545;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    .brand-title {
      font-family: 'Sora', system-ui, sans-serif;
    }

    a {
      color: inherit;
    }

    /* ============ HEADER ============ */
    header.topbar {
      background: linear-gradient(120deg, var(--petrol-900) 0%, var(--petrol-800) 55%, var(--petrol-700) 100%);
      color: #fff;
      padding: 28px clamp(16px, 4vw, 48px);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    header.topbar::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.06), transparent 70%);
      pointer-events: none;
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .brand-block img {
      height: 64px;
      width: auto;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.25));
    }

    .brand-divider {
      width: 1px;
      height: 48px;
      background: rgba(255, 255, 255, 0.25);
    }

    .brand-text h1 {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 500;
    }

    .update-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
    }

    .update-block label {
      text-transform: uppercase;
      letter-spacing: .06em;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 600;
    }

    .update-block input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      outline: none;
      transition: border-color .15s;
    }

    .update-block input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: .8;
    }

    .update-block input:focus {
      border-color: rgba(255, 255, 255, 0.7);
    }

    /* ============ MAIN LAYOUT ============ */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px clamp(16px, 4vw, 48px) 64px;
    }

    /* ============ SUMMARY CARDS ============ */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width:1100px) {
      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width:640px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .summary-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      border-top: 4px solid var(--accent, var(--petrol-700));
      position: relative;
    }

    .summary-card .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary-card .value {
      font-family: 'Sora', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-top: 8px;
      color: var(--petrol-900);
      line-height: 1;
    }

    .summary-card .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ============ FILTERS ============ */
    .filters {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 26px;
      box-shadow: var(--shadow-sm);
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--ink-soft);
    }

    .filter-field select,
    .filter-field input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      min-width: 170px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .filter-field select:focus,
    .filter-field input:focus {
      border-color: var(--teal-500);
      box-shadow: 0 0 0 3px var(--teal-100);
    }

    .filter-field.search {
      flex: 1;
      min-width: 220px;
    }

    .filter-field.search input {
      width: 100%;
      min-width: 0;
    }

    .filter-reset {
      align-self: flex-end;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--petrol-800);
      font-weight: 600;
      font-size: 13px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .filter-reset:hover {
      background: var(--teal-100);
      border-color: var(--teal-500);
    }

    .results-count {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .results-count strong {
      color: var(--petrol-900);
    }

    /* ============ STATUS BADGE ============ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 10px 5px 8px;
      border-radius: 999px;
      white-space: nowrap;
      max-height: 35px;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge.exec {
      background: var(--status-exec-bg);
      color: var(--status-exec-fg);
    }

    .badge.exec .dot {
      background: var(--status-exec-dot);
    }

    .badge.pend {
      background: var(--status-pend-bg);
      color: var(--status-pend-fg);
    }

    .badge.pend .dot {
      background: var(--status-pend-dot);
    }

    .badge.espera {
      background: var(--status-espera-bg);
      color: var(--status-espera-fg);
    }

    .badge.espera .dot {
      background: var(--status-espera-dot);
    }

    .badge.concl {
      background: var(--status-concl-bg);
      color: var(--status-concl-fg);
    }

    .badge.concl .dot {
      background: var(--status-concl-dot);
    }

    .badge.atraso {
      background: var(--status-atraso-bg);
      color: var(--status-atraso-fg);
    }

    .badge.atraso .dot {
      background: var(--status-atraso-dot);
    }

    /* ============ PROJECT CARDS ============ */
    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 8px 0 14px;
    }

    .section-title h2 {
      font-size: 18px;
      margin: 0;
      color: var(--petrol-900);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      margin-bottom: 44px;
    }

    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .project-card .dept {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--teal-500);
    }

    .project-card .pname {
      font-family: 'Sora', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--petrol-900);
      line-height: 1.3;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .meta-line {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .meta-line svg {
      flex-shrink: 0;
      opacity: .7;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #EAEEEF;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
    }

    .note {
      font-size: 13px;
      color: var(--ink-soft);
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      line-height: 1.45;
      border-left: 3px solid var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--ink-soft);
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
    }

    /* ============ TABLE ============ */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    thead th {
      background: var(--petrol-800);
      color: #fff;
      text-align: left;
      padding: 13px 16px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    tbody td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--ink);
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #FAFCFC;
    }

    .table-progress {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-progress .progress-track {
      width: 90px;
    }

    .table-progress span {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      min-width: 34px;
    }

    .table-wrap-scroll {
      overflow-x: auto;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--ink-soft);
    }

    @media (max-width:640px) {
      .topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .update-block {
        align-items: flex-start;
      }

      .brand-block img {
        height: 48px;
      }
    }
  </style>
</head>

        projeto: "Inclusão da Matéria-Prima",
        responsavel: "Giovani",
        prazo: "A definir",
        status: "Pendente",
        progresso: 0,
        observacao: "Projeto pendente de início."
      },
      {
        departamento: "Expedição",
        projeto: "Separação em Onda",
        responsavel: "Giovani",
        prazo: "A definir",
        status: "Pendente",
        progresso: 0,
        observacao: "Projeto aguardando definição para execução."
      },
      {
        departamento: "Comercial BM3 Trading",
        projeto: "BI de Comissão e Margem de Contribuição",
        responsavel: "Gabriel",
        prazo: "30/06/2026",
        status: "Em execução",
        progresso: 55,
        observacao: "BI em desenvolvimento para análise comercial."
      },
      {
        departamento: "Comercial INNEO",
        projeto: "Bitrix24",
        responsavel: "Patrick",
        prazo: "30/06/2026",
        status: "Em execução",
        progresso: 65,
        observacao: "Projeto em andamento para estruturação comercial no Bitrix24."
      }
    ];

    /* ===================== CONFIGURAÇÃO DE STATUS ===================== */
    const STATUS_CONFIG = {
      "Em execução": { badge: "exec", bar: "var(--status-exec-dot)" },
      "Pendente": { badge: "pend", bar: "var(--status-pend-dot)" },
      "Em espera": { badge: "espera", bar: "var(--status-espera-dot)" },
      "Concluído": { badge: "concl", bar: "var(--status-concl-dot)" },
      "Atrasado": { badge: "atraso", bar: "var(--status-atraso-dot)" }
    };

    const ICONS = {
      user: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>',
      calendar: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>'
    };

    /* ===================== ELEMENTOS ===================== */
    const summaryGrid = document.getElementById('summaryGrid');
    const cardsGrid = document.getElementById('cardsGrid');
    const tableBody = document.getElementById('tableBody');
    const filtroDepto = document.getElementById('filtroDepartamento');
    const filtroStatus = document.getElementById('filtroStatus');
    const filtroBusca = document.getElementById('filtroBusca');
    const resetFiltros = document.getElementById('resetFiltros');
    const resultsCount = document.getElementById('resultsCount');
    const dataAtualizacao = document.getElementById('dataAtualizacao');

    /* ===================== HELPERS ===================== */
    function badgeClass(status) {
      return (STATUS_CONFIG[status] && STATUS_CONFIG[status].badge) || "espera";
    }
    function barColor(status) {
      return (STATUS_CONFIG[status] && STATUS_CONFIG[status].bar) || "var(--status-espera-dot)";
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    /* ===================== RESUMO ===================== */
    function renderSummary(lista) {
      const total = lista.length;
      const counts = {
        "Em execução": 0,
        "Pendente": 0,
        "Em espera": 0,
        "Concluído": 0,
        "Atrasado": 0
      };
      lista.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });

      const cards = [
        { label: "Total de projetos", value: total, accent: "var(--petrol-700)", dot: null },
        { label: "Em execução", value: counts["Em execução"], accent: "var(--status-exec-dot)", dot: "var(--status-exec-dot)" },
        { label: "Pendentes", value: counts["Pendente"], accent: "var(--status-pend-dot)", dot: "var(--status-pend-dot)" },
        { label: "Em espera", value: counts["Em espera"], accent: "var(--status-espera-dot)", dot: "var(--status-espera-dot)" },
        { label: "Concluídos", value: counts["Concluído"], accent: "var(--status-concl-dot)", dot: "var(--status-concl-dot)" }
      ];

      summaryGrid.innerHTML = cards.map(c => `
    <div class="summary-card" style="--accent:${c.accent}">
      <div class="label">${c.dot ? `<span class="dot" style="background:${c.dot}"></span>` : ''}${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
    }

    /* ===================== FILTROS: popular selects ===================== */
    function popularFiltros() {
      const departamentos = [...new Set(projetos.map(p => p.departamento))].sort();
      const statusList = [...new Set(projetos.map(p => p.status))];

      filtroDepto.innerHTML = '<option value="todos">Todos os departamentos</option>' +
        departamentos.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');

      filtroStatus.innerHTML = '<option value="todos">Todos os status</option>' +
        statusList.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    }

    /* ===================== CARDS ===================== */
    function renderCards(lista) {
      if (lista.length === 0) {
        cardsGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Nenhum projeto encontrado com os filtros selecionados.</div>`;
        return;
      }
      cardsGrid.innerHTML = lista.map(p => `
    <div class="project-card">
      <div class="dept">${escapeHtml(p.departamento)}</div>
      <div class="card-row">
        <div class="pname">${escapeHtml(p.projeto)}</div>
        <span class="badge ${badgeClass(p.status)}"><span class="dot"></span>${escapeHtml(p.status)}</span>
      </div>
      <div class="meta-line">${ICONS.user}${escapeHtml(p.responsavel)}</div>
      <div class="meta-line">${ICONS.calendar}Prazo: ${escapeHtml(p.prazo)}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progresso</span><span>${p.progresso}%</span></div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${p.progresso}%; background:${barColor(p.status)}"></div>
        </div>
      </div>
      <div class="note">${escapeHtml(p.observacao)}</div>
    </div>
  `).join('');
    }

    /* ===================== TABELA ===================== */
    function renderTable(lista) {
      if (lista.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--ink-soft); padding:30px;">Nenhum projeto encontrado.</td></tr>`;
        return;
      }
      tableBody.innerHTML = lista.map(p => `
    <tr>
      <td>${escapeHtml(p.departamento)}</td>
      <td><strong>${escapeHtml(p.projeto)}</strong></td>
      <td>${escapeHtml(p.responsavel)}</td>
      <td><span class="badge ${badgeClass(p.status)}"><span class="dot"></span>${escapeHtml(p.status)}</span></td>
      <td>
        <div class="table-progress">
          <div class="progress-track"><div class="progress-fill" style="width:${p.progresso}%; background:${barColor(p.status)}"></div></div>
          <span>${p.progresso}%</span>
        </div>
      </td>
      <td>${escapeHtml(p.prazo)}</td>
      <td style="max-width:260px;">${escapeHtml(p.observacao)}</td>
    </tr>
  `).join('');
    }

    /* ===================== FILTRAGEM ===================== */
    function aplicarFiltros() {
      const depto = filtroDepto.value;
      const status = filtroStatus.value;
      const busca = filtroBusca.value.trim().toLowerCase();

      const filtrados = projetos.filter(p => {
        const okDepto = depto === 'todos' || p.departamento === depto;
        const okStatus = status === 'todos' || p.status === status;
        const okBusca = !busca ||
          p.projeto.toLowerCase().includes(busca) ||
          p.responsavel.toLowerCase().includes(busca);
        return okDepto && okStatus && okBusca;
      });

      renderCards(filtrados);
      renderTable(filtrados);
      resultsCount.innerHTML = `Exibindo <strong>${filtrados.length}</strong> de <strong>${projetos.length}</strong> projeto(s)`;
    }

    /* ===================== EVENTOS ===================== */
    filtroDepto.addEventListener('change', aplicarFiltros);
    filtroStatus.addEventListener('change', aplicarFiltros);
    filtroBusca.addEventListener('input', aplicarFiltros);
    resetFiltros.addEventListener('click', () => {
      filtroDepto.value = 'todos';
      filtroStatus.value = 'todos';
      filtroBusca.value = '';
      aplicarFiltros();
    });

    /* ===================== DATA DE ATUALIZAÇÃO ===================== */
    (function initData() {
      const hoje = new Date();
      const iso = hoje.toISOString().slice(0, 10);
      dataAtualizacao.value = iso;
    })();

    /* ===================== INICIALIZAÇÃO ===================== */
    popularFiltros();
    renderSummary(projetos);
    renderCards(projetos);
    renderTable(projetos);
    resultsCount.innerHTML = `Exibindo <strong>${projetos.length}</strong> de <strong>${projetos.length}</strong> projeto(s)`;
  </script>

</body>

</html>
